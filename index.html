<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ffe6f0;
    overflow: hidden;
}

/* Center layout */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    padding-top: 40px; /* pushes content slightly down */
}

h1 {
    color: #ff4d88;
    font-size: 6vw;
}

#teaseText {
    color: #ff4d88;
    font-size: 4vw;
    margin: 10px;
    height: 30px;
}

/* Buttons */
.button-group {
    display: flex;
    gap: 20px;
    margin-top: 60px; /* moved lower */
}

button {
    padding: 12px 20px;
    font-size: 5vw;
    border: none;
    border-radius: 10px;
}

#yesBtn {
    background-color: #ff4d88;
    color: white;
}

#noBtn {
    background-color: #999;
    color: white;
    position: relative;
}

/* 🐱 Bigger Corner Stickers */
.sticker {
    position: fixed;
    width: 50%;      
    max-width: 260px;  
    pointer-events: none;
    opacity: 0.95;
}

.s1 { top: 5%; left: 5%; }
.s2 { top: 5%; right: 5%; }
.s3 { bottom: 5%; left: 5%; }
.s4 { bottom: 5%; right: 5%; }
.s5 { top: 20%; left: 27%; }

/* Shake */
@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(-3px,2px); }
    50% { transform: translate(3px,-2px); }
    75% { transform: translate(-2px,1px); }
    100% { transform: translate(0,0); }
}
.shake { animation: shake 0.3s; }

/* Hearts */
.heart {
    position: fixed;
    font-size: 18px;
    animation: floatUp 3s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity:1; }
    to { transform: translateY(-10vh); opacity:0; }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 6px;
    height: 6px;
    animation: explode 1.5s ease-out forwards;
}

@keyframes explode {
    from { transform: translate(0,0); }
    to { transform: translate(var(--x), var(--y)); opacity:0; }
}

/* Final image */
#finalImage {
    width: 80%;
    max-width: 300px;
    border-radius: 20px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🐱 Static Stickers -->
<img src="pic2.png" class="sticker s1">
<img src="pic1.png" class="sticker s2">
<img src="pic6.png" class="sticker s3">
<img src="pic4.png" class="sticker s4">
<img src="pic3.png" class="sticker s5">

<div class="container">
    <h1>Will you be my forever? 💖</h1>
    <p id="teaseText"></p>

    <div class="button-group">
        <button id="yesBtn">Yes 🤍</button>
        <button id="noBtn">No 🥺</button>
    </div>
</div>

<audio id="popSound" src="Pop.mp3"></audio>
<audio id="successSound" src="Success.mp3"></audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const teaseText = document.getElementById("teaseText");

const popSound = document.getElementById("popSound");
const successSound = document.getElementById("successSound");

let yesScale = 1;

const messages = [
    "You sure? 😏","Think again 🥺","No escape 😆",
    "Try again 💖","Hehe nope 😜","Come onnn ❤️"
];

/* Move NO button */
function moveNoButton() {
    const rect = noBtn.getBoundingClientRect();

    const maxX = window.innerWidth - rect.width;
    const maxY = window.innerHeight - rect.height;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    popSound.currentTime = 0;
    popSound.play();

    noBtn.classList.add("shake");
    setTimeout(() => noBtn.classList.remove("shake"), 300);

    teaseText.innerText = messages[Math.floor(Math.random()*messages.length)];

    yesScale += 0.15;
    yesBtn.style.transform = `scale(${yesScale})`;

    if (yesScale > 3) {
        yesBtn.style.position = "fixed";
        yesBtn.style.width = "100vw";
        yesBtn.style.height = "100vh";
        yesBtn.style.left = "0";
        yesBtn.style.top = "0";
        yesBtn.style.borderRadius = "0";
        yesBtn.style.fontSize = "8vw";
    }
}

noBtn.addEventListener("click", moveNoButton);

/* YES clicked */
yesBtn.addEventListener("click", () => {
    successSound.play();

    clearInterval(heartInterval);
    clearInterval(stickerInterval);

    document.body.innerHTML = `
        <div class="container">
            <h1 style="font-size:8vw;">
                YAY!!! 💖🎉<br>
                Happy Birthday Suttuuu ❤️
            </h1>
            <img src="pic5.png" id="finalImage">
        </div>
    `;

    launchConfetti();
});

/* 💖 Hearts */
const heartInterval = setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
}, 400);

/* 🐱 Floating Stickers */
const stickerImages = ["free1.png","free2.png","free3.png","free4.png","free6.png"];

const stickerInterval = setInterval(() => {
    const img = document.createElement("img");

    img.src = stickerImages[Math.floor(Math.random()*stickerImages.length)];
    img.style.position = "fixed";
    img.style.width = (Math.random()*40 + 40) + "px";
    img.style.left = Math.random()*100 + "vw";
    img.style.top = "100vh";
    img.style.pointerEvents = "none";

    document.body.appendChild(img);

    img.animate([
        { transform: "translateY(0)", opacity: 1 },
        { transform: "translateY(-120vh)", opacity: 0 }
    ], {
        duration: 5000,
        easing: "linear"
    });

    setTimeout(()=>img.remove(),5000);
}, 700);

/* 🎊 Confetti */
function launchConfetti() {
    const colors=["#ff4d88","#ffd700","#00ccff"];
    const cx=window.innerWidth/2;
    const cy=window.innerHeight/2;

    for(let i=0;i<80;i++){
        const c=document.createElement("div");
        c.classList.add("confetti");

        c.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        c.style.left = cx+"px";
        c.style.top = cy+"px";

        const angle = Math.random()*2*Math.PI;
        const dist = Math.random()*250;

        c.style.setProperty("--x", Math.cos(angle)*dist+"px");
        c.style.setProperty("--y", Math.sin(angle)*dist+"px");

        document.body.appendChild(c);
        setTimeout(()=>c.remove(),1500);
    }
}
</script>

</body>
</html>
